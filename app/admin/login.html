<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Sign In — Radiant Medical Physics Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/radiant-logo.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg-elev:#fafafa;--line:#e6e6e8;--line-hi:#cdcdd1;
  --text:#1a1a1a;--text-mute:#5a5a5a;--text-dim:#8a8a8a;
  --accent:#d00008;--accent-2:#a80006;
}
body{background:var(--bg-elev);color:var(--text);
  font-family:'Montserrat',system-ui,sans-serif;font-size:16px;line-height:1.6;
  -webkit-font-smoothing:antialiased;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:40px 20px}
body::before{content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle at 1px 1px,rgba(208,0,8,.04) 1px,transparent 0);
  background-size:32px 32px;pointer-events:none}
img{max-width:100%;display:block}
.card{position:relative;width:100%;max-width:400px;background:var(--bg);
  border:1px solid var(--line);border-top:3px solid var(--accent);
  padding:40px 36px;text-align:center}
.logo{height:120px;width:auto;margin:0 auto 18px}
h1{font-size:24px;font-weight:800;letter-spacing:-.02em}
.sub{font-size:14px;color:var(--text-mute);margin-bottom:28px}
.tag{display:inline-block;font:600 10.5px 'JetBrains Mono',monospace;
  letter-spacing:.12em;text-transform:uppercase;color:var(--accent);
  background:rgba(208,0,8,.07);padding:4px 10px;border-radius:4px;margin-bottom:16px}
.field{margin-bottom:16px;text-align:left}
.field label{display:block;font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;color:var(--text-mute);
  margin-bottom:7px}
.field input{width:100%;font-family:inherit;font-size:15px;padding:12px 14px;
  border:1px solid var(--line-hi);border-radius:8px;background:var(--bg-elev);color:var(--text)}
.field input:focus{outline:none;border-color:var(--accent);background:var(--bg)}
.btn{display:inline-flex;align-items:center;justify-content:center;width:100%;
  gap:8px;padding:13px 24px;font-size:14px;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;border-radius:999px;border:1px solid transparent;
  cursor:pointer;transition:background .2s;margin-top:6px;
  background:var(--accent);color:#fff}
.btn:hover{background:var(--accent-2)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.msg{margin-top:14px;font-size:13.5px;font-weight:600;min-height:18px;color:var(--accent)}
.hint{margin-top:22px;padding-top:18px;border-top:1px solid var(--line);
  font-size:12.5px;color:var(--text-dim)}
</style>
</head>
<body>

<div class="card">
  <img src="/radiant-logo.png" alt="Radiant Medical Physics Consulting LLC" class="logo">
  <div class="tag">Admin Console</div>
  <h1>Admin Sign In</h1>
  <p class="sub">Operator access to the License Manager and Client Setup.</p>
  <form id="form" autocomplete="on">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username" required spellcheck="false">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" id="btn">Sign In</button>
    <div class="msg" id="err" role="alert"></div>
  </form>
  <p class="hint">Admin access is restricted to authorized operators.</p>
</div>

<script>
document.getElementById('form').addEventListener('submit', async function(e){
  e.preventDefault();
  var err = document.getElementById('err');
  var btn = document.getElementById('btn');
  err.textContent = '';
  btn.disabled = true;
  try {
    var res = await fetch('/admin/api/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    var data = {};
    try { data = await res.json(); } catch (ex) {}
    if (res.ok) {
      if (data.must_change_password) {
        location.href = '/admin/change-password.html';
        return;
      }
      // Honor ?next=<path> when the Worker bounced us here; same
      // open-redirect guard the portal login uses.
      var qsNext = new URLSearchParams(location.search).get('next') || '';
      var safe = (qsNext && qsNext.charAt(0) === '/' &&
                  qsNext.charAt(1) !== '/') ? qsNext : '/admin/index.html';
      location.href = safe;
    } else {
      err.textContent = data.error || 'Sign-in failed.';
      btn.disabled = false;
    }
  } catch (ex) {
    err.textContent = 'Could not reach the server.';
    btn.disabled = false;
  }
});
</script>

</body>
</html>
