<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Sign In — Radiant Medical Physics Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/radiant-logo.png">
<link rel="stylesheet" href="/bold.css">
<style>
/* Admin sign-in — Bold · Radiant Field (inherits bold.css dark tokens) */
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;
  background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(240,39,29,.12),transparent 60%),var(--bg)}
.card{position:relative;width:100%;max-width:420px;background:linear-gradient(180deg,var(--bg-2),var(--bg-3));
  border:1px solid var(--line);border-top:3px solid var(--accent);border-radius:18px;padding:40px 36px;text-align:center;
  box-shadow:0 40px 90px -40px rgba(48,48,48,.16)}
.logo{height:96px;width:auto;margin:0 auto 18px}
h1{font-family:var(--font-display);font-size:24px;font-weight:900;letter-spacing:-.02em;color:var(--text);text-transform:uppercase}
.sub{font-size:14px;color:var(--ink-2);margin-bottom:28px}
.tag{display:inline-block;font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);background:rgba(240,39,29,.12);border:1px solid rgba(240,39,29,.35);padding:4px 10px;border-radius:6px;margin-bottom:16px}
.field{margin-bottom:16px;text-align:left}
.field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-2);margin-bottom:7px}
.field input{width:100%;font-family:var(--font-body);font-size:15px;padding:12px 14px;border:1px solid var(--line-hi);border-radius:8px;background:rgba(255,255,255,.04);color:var(--text)}
.field input:focus{outline:none;border-color:var(--accent);background:rgba(255,255,255,.07)}
.card .btn{width:100%;justify-content:center;margin-top:6px;background:var(--red);color:#fff;border-color:transparent}
.card .btn:hover{background:#ff3a30;color:#fff;transform:translateY(-2px);box-shadow:0 16px 40px -10px rgba(240,39,29,.75)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.msg{margin-top:14px;font-size:13.5px;font-weight:600;min-height:18px;color:var(--accent)}
.hint{margin-top:22px;padding-top:18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--ink-3)}
</style>
</head>
<body>

<div class="card">
  <img src="/radiant-logo.png" alt="Radiant Medical Physics Consulting LLC" class="logo">
  <div class="tag">Admin Console</div>
  <h1>Admin Sign In</h1>
  <p class="sub">Operator access to the License Manager and Client Setup.</p>
  <form id="form" autocomplete="on">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username" required spellcheck="false">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" id="btn">Sign In</button>
    <div class="msg" id="err" role="alert"></div>
  </form>
  <p class="hint">Admin access is restricted to authorized operators.</p>
</div>

<script>
document.getElementById('form').addEventListener('submit', async function(e){
  e.preventDefault();
  var err = document.getElementById('err');
  var btn = document.getElementById('btn');
  err.textContent = '';
  btn.disabled = true;
  try {
    var res = await fetch('/admin/api/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    var data = {};
    try { data = await res.json(); } catch (ex) {}
    if (res.ok) {
      if (data.must_change_password) {
        location.href = '/admin/change-password.html';
        return;
      }
      // Honor ?next=<path> when the Worker bounced us here; same
      // open-redirect guard the portal login uses.
      var qsNext = new URLSearchParams(location.search).get('next') || '';
      var safe = (qsNext && qsNext.charAt(0) === '/' &&
                  qsNext.charAt(1) !== '/') ? qsNext : '/admin/index.html';
      location.href = safe;
    } else {
      err.textContent = data.error || 'Sign-in failed.';
      btn.disabled = false;
    }
  } catch (ex) {
    err.textContent = 'Could not reach the server.';
    btn.disabled = false;
  }
});
</script>

</body>
</html>
