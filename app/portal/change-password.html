<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Set a New Password — Radiant Medical Physics Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/radiant-logo.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg-elev:#fafafa;--bg-card:#f4f4f5;
  --line:#e6e6e8;--line-hi:#cdcdd1;
  --text:#1a1a1a;--text-mute:#5a5a5a;--text-dim:#8a8a8a;
  --accent:#d00008;--accent-2:#a80006;--accent-bright:#f03020;--accent-warm:#f86058;
  --charcoal:#303030;--ok:#1a7f37;
  --font-display:'Montserrat',system-ui,sans-serif;
  --font-body:'Montserrat',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  --max-w:1180px;--pad-x:clamp(20px,5vw,64px);
}
body{background:var(--bg-elev);color:var(--text);
  font-family:'Montserrat',system-ui,sans-serif;font-size:16px;line-height:1.6;
  -webkit-font-smoothing:antialiased;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:40px 20px}
img{max-width:100%;display:block}
.card{position:relative;width:100%;max-width:440px;background:var(--bg);
  border:1px solid var(--line);border-top:3px solid var(--accent);
  padding:36px 38px;text-align:center}
.logo{height:84px;width:auto;margin:0 auto 14px}
h1{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.sub{font-size:14px;color:var(--text-mute);margin-bottom:22px}
.notice{background:#fff7e6;border:1px solid #f0c674;color:#8a4b00;
  padding:11px 14px;border-radius:6px;font-size:13px;margin-bottom:22px;line-height:1.5}
.field{margin-bottom:14px;text-align:left}
.field label{display:block;font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;color:var(--text-mute);
  margin-bottom:7px}
.field input{width:100%;font-family:inherit;font-size:15px;padding:11px 13px;
  border:1px solid var(--line-hi);border-radius:8px;background:var(--bg-elev);color:var(--text)}
.field input:focus{outline:none;border-color:var(--accent);background:var(--bg)}
.btn{display:inline-flex;align-items:center;justify-content:center;width:100%;
  padding:12px 24px;font-size:13.5px;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;border-radius:999px;border:none;cursor:pointer;
  margin-top:6px;background:var(--accent);color:#fff}
.btn:hover{background:var(--accent-2)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.msg{margin-top:14px;font-size:13.5px;font-weight:600;min-height:18px}
.msg-err{color:var(--accent)}
.msg-ok{color:var(--ok)}
.foot{margin-top:18px;font-size:11.5px;color:var(--text-dim)}

/* --- Bold dark surface polish (appended) --- */
.card,.lm-card,.client-card,.dl-card,.guide-card,.gate-card,.result,.creds,.notice,.app-head,.client-head{background:var(--bg-card)!important}
.field input,.field textarea,.field select,.gate-input,.inp,input[type=text],input[type=email],input[type=password],input[type=number],input[type=date],textarea,select{background:rgba(255,255,255,.04);color:var(--text);border-color:var(--line-hi)}
.field input:focus,.gate-input:focus,.inp:focus,input:focus,textarea:focus,select:focus{background:rgba(255,255,255,.07);border-color:var(--accent);outline:none}
table th{color:var(--text-dim)}


/* --- dark contrast corrections --- */
.notice,.warn{background:rgba(240,196,116,.10)!important;border:1px solid rgba(240,196,116,.35)!important;color:#f0d28a!important}
.notice a,.warn a{color:#ffd98a!important}
code,.creds-row code,.app-key,.loc-key{background:rgba(255,255,255,.06)!important;border-color:var(--line-hi)!important;color:var(--text)!important}

</style>
</head>
<body>

<div class="card">
  <img src="/radiant-logo.png" alt="" class="logo">
  <h1>Set a New Password</h1>
  <p class="sub">Welcome to Radiant. Please choose a password of your own to continue.</p>
  <div class="notice">
    Your account was created with a temporary password set by Radiant.
    Choose a new one now &mdash; only you should know it.
  </div>
  <form id="form" autocomplete="on">
    <div class="field">
      <label for="current">Current password
        <span style="font-weight:500;color:#8a8a8a;text-transform:none;letter-spacing:0">
          — the one you signed in with</span>
      </label>
      <input type="password" id="current" autocomplete="current-password" required>
    </div>
    <div class="field">
      <label for="next">New password
        <span style="font-weight:500;color:#8a8a8a;text-transform:none;letter-spacing:0">
          — at least 8 characters</span>
      </label>
      <input type="password" id="next" autocomplete="new-password" required minlength="8">
    </div>
    <div class="field">
      <label for="confirm">Confirm new password</label>
      <input type="password" id="confirm" autocomplete="new-password" required minlength="8">
    </div>
    <button type="submit" class="btn" id="btn">Set New Password</button>
    <div class="msg msg-err" id="err" role="alert"></div>
  </form>
  <p class="foot">Once set, you'll be redirected to the Radiant launcher.</p>
</div>

<script>
document.getElementById('form').addEventListener('submit', async function(e){
  e.preventDefault();
  var err = document.getElementById('err');
  var btn = document.getElementById('btn');
  err.classList.add('msg-err'); err.classList.remove('msg-ok');
  err.textContent = '';
  var current = document.getElementById('current').value;
  var next = document.getElementById('next').value;
  var confirm = document.getElementById('confirm').value;
  if (next !== confirm) {
    err.textContent = 'The two new-password fields do not match.';
    return;
  }
  btn.disabled = true;
  try {
    var res = await fetch('/portal/api/change-password', {
      method: 'POST',
      credentials: 'include',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ current_password: current, new_password: next })
    });
    var data = {};
    try { data = await res.json(); } catch (ex) {}
    if (res.ok) {
      err.classList.remove('msg-err'); err.classList.add('msg-ok');
      err.textContent = 'Password updated. Redirecting...';
      // Respect ?next= if the Worker passed one along.
      var qsNext = new URLSearchParams(location.search).get('next') || '';
      var safe = (qsNext && qsNext.charAt(0) === '/' &&
                  qsNext.charAt(1) !== '/') ? qsNext : '/';
      setTimeout(function(){ location.href = safe; }, 800);
    } else {
      err.textContent = data.error || 'Could not change password.';
      btn.disabled = false;
    }
  } catch (ex) {
    err.textContent = 'Could not reach the server.';
    btn.disabled = false;
  }
});
</script>

</body>
</html>
