<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Client Sign In — Radiant Medical Physics Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/radiant-logo.png">
<link rel="stylesheet" href="/bold.css">
<style>
/* Client sign-in — Bold · Radiant Field (inherits bold.css dark tokens) */
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;
  background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(240,39,29,.12),transparent 60%),var(--bg)}
.login-card{position:relative;width:100%;max-width:420px;background:linear-gradient(180deg,var(--bg-2),var(--bg-3));
  border:1px solid var(--line);border-top:3px solid var(--accent);border-radius:18px;padding:40px 36px;text-align:center;
  box-shadow:0 40px 90px -40px rgba(0,0,0,.95)}
.login-logo{height:96px;width:auto;margin:0 auto 18px}
h1{font-family:var(--font-display);font-size:24px;font-weight:900;letter-spacing:-.02em;color:#fff;text-transform:uppercase}
.sub{font-size:14px;color:var(--ink-2);margin-bottom:28px}
.field{margin-bottom:16px;text-align:left}
.field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-2);margin-bottom:7px}
.field input{width:100%;font-family:var(--font-body);font-size:15px;padding:12px 14px;border:1px solid var(--line-hi);border-radius:8px;background:rgba(255,255,255,.04);color:var(--text)}
.field input:focus{outline:none;border-color:var(--accent);background:rgba(255,255,255,.07)}
.login-card .btn{width:100%;justify-content:center;margin-top:6px}
.btn:disabled{opacity:.55;cursor:not-allowed}
.msg{margin-top:14px;font-size:13.5px;font-weight:600;min-height:18px}
.msg-err{color:var(--accent)}
.hint{margin-top:22px;padding-top:18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--ink-3)}
.hint a{color:var(--ink-2)}
</style>
</head>
<body>

<div class="login-card">
  <img src="/radiant-logo-black.png" alt="Radiant Medical Physics Consulting LLC" class="login-logo">
  <h1>Client Sign In</h1>
  <p class="sub">Access your licensed Radiant apps.</p>
  <form id="loginForm" autocomplete="on">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
    <div class="msg msg-err" id="err" role="alert"></div>
  </form>
  <p class="hint">Trouble signing in? Email <a href="mailto:info@Radiant-MPC.com?subject=Client%20portal%20access">info@Radiant-MPC.com</a></p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  var err = document.getElementById('err');
  var btn = document.getElementById('loginBtn');
  err.textContent = '';
  btn.disabled = true;
  try {
    var res = await fetch('/portal/api/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      })
    });
    var data = {};
    try { data = await res.json(); } catch (ex) {}
    if (res.ok) {
      // Forced first-login password change short-circuits everything.
      if (data.must_change_password) {
        var qsForChange = new URLSearchParams(location.search).get('next');
        var target = '/portal/change-password.html';
        if (qsForChange) target += '?next=' + encodeURIComponent(qsForChange);
        location.href = target;
        return;
      }
      // Respect ?next=<path> when the Worker bounced us here. Must be
      // a same-origin path (starts with "/" and not "//") to block
      // open-redirect abuse; otherwise fall back to the portal home.
      var qsNext = new URLSearchParams(location.search).get('next') || '';
      var safe = (qsNext && qsNext.charAt(0) === '/' &&
                  qsNext.charAt(1) !== '/') ? qsNext : '/portal/';
      location.href = safe;
    } else {
      err.textContent = data.error || 'Sign-in failed. Please try again.';
      btn.disabled = false;
    }
  } catch (ex) {
    err.textContent = 'Could not reach the server. Please try again.';
    btn.disabled = false;
  }
});
</script>

</body>
</html>
